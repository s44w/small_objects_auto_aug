project:
  name: "coco_small_auto_aug_mvp"
  seed: 42
  deterministic: true

dataset:
  kind: "coco_small"   # visdrone | coco_small
  root: "./datasets/coco_small_yolo"
  mode: "manual"       # manual | auto
  raw_root: "./datasets/coco2017_raw"  # required when mode=auto
  splits:
    - "train"
    - "val"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".bmp"
  class_names:
    - "person"
    - "bicycle"
    - "car"
    - "motorcycle"
    - "airplane"
    - "bus"
    - "train"
    - "truck"
    - "boat"
    - "traffic light"
    - "fire hydrant"
    - "stop sign"
    - "parking meter"
    - "bench"
    - "bird"
    - "cat"
    - "dog"
    - "horse"
    - "sheep"
    - "cow"
    - "elephant"
    - "bear"
    - "zebra"
    - "giraffe"
    - "backpack"
    - "umbrella"
    - "handbag"
    - "tie"
    - "suitcase"
    - "frisbee"
    - "skis"
    - "snowboard"
    - "sports ball"
    - "kite"
    - "baseball bat"
    - "baseball glove"
    - "skateboard"
    - "surfboard"
    - "tennis racket"
    - "bottle"
    - "wine glass"
    - "cup"
    - "fork"
    - "knife"
    - "spoon"
    - "bowl"
    - "banana"
    - "apple"
    - "sandwich"
    - "orange"
    - "broccoli"
    - "carrot"
    - "hot dog"
    - "pizza"
    - "donut"
    - "cake"
    - "chair"
    - "couch"
    - "potted plant"
    - "bed"
    - "dining table"
    - "toilet"
    - "tv"
    - "laptop"
    - "mouse"
    - "remote"
    - "keyboard"
    - "cell phone"
    - "microwave"
    - "oven"
    - "toaster"
    - "sink"
    - "refrigerator"
    - "book"
    - "clock"
    - "vase"
    - "scissors"
    - "teddy bear"
    - "hair drier"
    - "toothbrush"
  coco_small:
    small_max_area: 1024.0
    keep_images_without_small: false
    include_crowd: false
    link_images: true
    selected_category_ids: null

analysis:
  small_max_area: 1024.0
  medium_max_area: 9216.0
  tiny_max_area: 256.0
  generate_plots: true

policy:
  use_object_bank: true
  object_bank:
    max_items_per_class: 2000
  small_ratio_threshold: 0.5
  dense_objects_per_image_threshold: 15.0
  dense_objects_per_mpix_threshold: 30.0
  illum_v_std_threshold: 35.0
  imbalance_ratio_threshold: 10.0
  small_imbalance_ratio_threshold: 6.0
  allow_flipud: false
  enable_mixup_cutmix: false
  low_variability_vstd_threshold: 14.0
  bbox_crop_min_visibility: 0.30
  bbox_crop_min_area: 16.0
  bbox_copy_paste_ioa_threshold: 0.30
  bbox_copy_paste_max_pastes: 3

training:
  model: "yolo11s.pt"
  data_yaml: "./datasets/coco_small_yolo/coco_small.yaml"
  epochs_fast: 10
  epochs_final: 80
  fraction_final: 1.0
  imgsz: 960
  batch: 16
  device: null
  workers: 4
  fraction_fast: 0.15
  project_dir: "./runs"
  run_ablation: true
  baseline_disable_albumentations: true
  require_custom_augmentations: true
  # Uncomment for final statistical replication:
  # seeds: [42, 43, 44]
  rect: false
  multi_scale: false

evaluation:
  iou_type: "bbox"
  use_tiny_eval: true
  use_tta: true
  imgsz: 960
